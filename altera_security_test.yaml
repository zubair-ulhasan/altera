openapi: "3.1.0"
info:
  title: "Altera Security Test Suite"
  version: "1.0.0"

servers:
  - url: "/"

security: []

tags:
  - name: "Broken Pagination"
  - name: "Broken Authentication"
  - name: "Enumerable Resource IDs"
  - name: "Rate Limit Missing"

paths:

  /manage/v1/tags:
    get:
      tags:
        - "Broken Pagination"
        - "Rate Limit Missing"
      summary: "Get Tags"
      operationId: "getTags"
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            example: 99999
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tag"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /loki/widget/v1/gamification:
    get:
      tags:
        - "Broken Authentication"
        - "Rate Limit Missing"
      summary: "Get Gamification Data"
      operationId: "getGamification"
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GamificationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /loki/widget/v1/{id}/{id2}:
    get:
      tags:
        - "Broken Authentication"
        - "Enumerable Resource IDs"
        - "Rate Limit Missing"
      summary: "Get Widget by IDs"
      operationId: "getWidgetById"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
        - name: id2
          in: path
          required: true
          schema:
            type: integer
            example: 2
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WidgetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /loki/widget/v1/user_profile/{id}:
    get:
      tags:
        - "Broken Authentication"
        - "Enumerable Resource IDs"
        - "Rate Limit Missing"
      summary: "Get User Profile"
      operationId: "getUserProfile"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 42
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /loki/widget/v1/task:
    get:
      tags:
        - "Broken Authentication"
        - "Rate Limit Missing"
      summary: "Get Tasks"
      operationId: "getTasks"
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, active, completed]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /loki/share/v1/playlist/{id}:
    get:
      tags:
        - "Broken Authentication"
        - "Enumerable Resource IDs"
        - "Rate Limit Missing"
      summary: "Get Shared Playlist"
      operationId: "getSharedPlaylist"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 7
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /loki/widget/v1/courses/{id}:
    get:
      tags:
        - "Broken Authentication"
        - "Enumerable Resource IDs"
        - "Rate Limit Missing"
      summary: "Get Course"
      operationId: "getCourseById"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 101
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /loki/widget/v1/channels/settings:
    get:
      tags:
        - "Broken Authentication"
        - "Rate Limit Missing"
      summary: "Get Channel Settings"
      operationId: "getChannelSettings"
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /api/v1/chats/share/{share_id}:
    get:
      tags:
        - "Enumerable Resource IDs"
        - "Rate Limit Missing"
      summary: "Get Shared Chat"
      operationId: "getSharedChat"
      parameters:
        - name: share_id
          in: path
          required: true
          schema:
            type: integer
            example: 12345
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SharedChatResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

  /ecommerce/{id}:
    get:
      tags:
        - "Enumerable Resource IDs"
        - "Rate Limit Missing"
      summary: "Get Ecommerce Resource"
      operationId: "getEcommerceResource"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EcommerceResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimitExceeded"

components:

  headers:
    X-RateLimit-Limit:
      schema:
        type: integer
        example: 100
    X-RateLimit-Remaining:
      schema:
        type: integer
        example: 99
    X-RateLimit-Reset:
      schema:
        type: integer
        example: 1715000000
    Retry-After:
      schema:
        type: integer
        example: 60

  responses:
    Unauthorized:
      description: "401 Unauthorized"
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: "Bearer"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    BadRequest:
      description: "400 Bad Request"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: "404 Not Found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    RateLimitExceeded:
      description: "429 Too Many Requests"
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/X-RateLimit-Limit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/X-RateLimit-Remaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/X-RateLimit-Reset"
        Retry-After:
          $ref: "#/components/headers/Retry-After"
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
              retry_after:
                type: integer
          example:
            detail: "Rate limit exceeded. Try again in 60 seconds."
            retry_after: 60

  schemas:
    Tag:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
        code:
          type: integer

    GamificationResponse:
      type: object
      properties:
        points:
          type: integer
        level:
          type: integer
        badges:
          type: array
          items:
            type: string
        streak_days:
          type: integer

    WidgetResponse:
      type: object
      properties:
        id:
          type: string
        id2:
          type: string
        type:
          type: string
        data:
          type: object

    UserProfileResponse:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string

    TaskListResponse:
      type: object
      properties:
        total:
          type: integer
        tasks:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              status:
                type: string
              due_date:
                type: string
                format: date-time

    PlaylistResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        item_count:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string

    CourseResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        instructor:
          type: string
        lesson_count:
          type: integer

    ChannelSettingsResponse:
      type: object
      properties:
        channel_id:
          type: string
        name:
          type: string
        settings:
          type: object
          additionalProperties: true

    SharedChatResponse:
      type: object
      properties:
        share_id:
          type: string
        title:
          type: string
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string

    EcommerceResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
        stock:
          type: integer
